version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: candidatos-postgres
    environment:
      POSTGRES_DB: candidatos_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: dev_password_2026
    ports:
      - "54333:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./triggers.sql:/docker-entrypoint-initdb.d/02-triggers.sql
      - ./indexes.sql:/docker-entrypoint-initdb.d/03-indexes.sql
      - ./seed_data.sql:/docker-entrypoint-initdb.d/04-seed_data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d candidatos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: candidatos-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@candidatos.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: